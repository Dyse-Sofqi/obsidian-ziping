<!DOCTYPE html>
<html>
<head>
    <title>八字排盘调试工具</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug-info { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .value { color: #007acc; font-weight: bold; }
    </style>
</head>
<body>
    <h1>八字排盘调试信息</h1>
    <div id="debugOutput">调试信息将在这里显示</div>
    
    <script>
        // 监听调试信息变化
        function checkDebugInfo() {
            const output = document.getElementById('debugOutput');
            if (window._debugDayun && Object.keys(window._debugDayun).length > 0) {
                let html = '<div class="debug-info">';
                html += '<h3>排大运计算调试信息：</h3>';
                html += `<p>精度模式：<span class="value">${window._debugDayun.pdy ? '精确计算(pdy=true)' : '粗略计算(pdy=false)'}</span></p>`;
                html += `<p>年长(ta)：<span class="value">${window._debugDayun.ta} 天</span></p>`;
                html += `<p>节气段：xf=<span class="value">${window._debugDayun.xf?.toFixed(6)}</span>天, yf=<span class="value">${window._debugDayun.yf?.toFixed(6)}</span>天</p>`;
                html += `<p>运方向：<span class="value">${window._debugDayun.direction || '未知'}</span></p>`;
                html += `<p>计算模式：<span class="value">${window._debugDayun.mode || '未知'}</span></p>`;
                html += `<p>比例系数：<span class="value">${window._debugDayun.ratio?.toFixed(6) || '未知'}</span></p>`;
                html += `<p>起运天数(zf)：<span class="value">${window._debugDayun.zf?.toFixed(6) || '未知'}</span>天</p>`;
                html += '</div>';
                output.innerHTML = html;
            } else {
                output.innerHTML = '<p>等待排大运计算数据...</p>';
            }
        }
        
        // 定时检查
        setInterval(checkDebugInfo, 1000);
        checkDebugInfo();
    </script>
</body>
</html>
